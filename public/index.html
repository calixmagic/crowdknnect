<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Expérience Magique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.5s ease;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .fullscreen-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            /* Modern iOS black bar fix */
        }

        /* Hidden by default */
        #mask-overlay,
        #eye-container,
        #unlock-icon,
        #wave-overlay,
        #fire-container,
        #static-overlay,
        #puzzle-container {
            display: none;
        }

        .screen.active {
            display: flex;
        }

        #connect-screen {
            z-index: 1000;
            background: #000;
        }

        .mystic-wheel {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 2s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 12px rgba(255, 255, 255, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        #start-btn {
            animation: pulse 2s infinite;
        }

        #logo-container {
            width: 80vw;
            max-width: 400px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            transition: transform 0.2s ease-out;
        }

        #engine-screen {
            z-index: 500;
        }

        #emoji-display {
            font-size: 15vh;
        }

        #media-display {
            width: 85%;
            max-width: 500px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: none;
        }

        #video-display {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #final-screen {
            z-index: 2000;
            background: #fff;
            color: #000;
            padding: 20px;
            text-align: center;
        }

        .final-btn {
            width: 100%;
            max-width: 300px;
            padding: 20px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: #fff;
        }

        .btn-google {
            background: #4285F4;
            color: #fff;
        }

        /* Flash Effects */
        body.flash-bg {
            background-color: #fff !important;
        }

        body.flash-strobe {
            animation: strobeEffect 0.1s infinite;
        }

        @keyframes strobeEffect {

            0%,
            50% {
                background-color: #000;
            }

            51%,
            100% {
                background-color: #fff;
            }
        }

        .red {
            color: #f00 !important;
        }

        .black {
            color: #fff !important;
        }

        .white-bg {
            background-color: #fff !important;
            color: #000 !important;
        }

        .flash-bg {
            background-color: #fff !important;
            transition: none !important;
        }

        .blackout-bg {
            background-color: #000 !important;
            transition: none !important;
        }

        /* Heart morphing animation */
        #heart-svg {
            position: absolute;
            width: 100px;
            height: 100px;
            display: none;
        }

        #heart-svg.active {
            display: block;
            animation: heartMorph 3s ease-in-out forwards;
        }

        @keyframes heartMorph {
            0% {
                transform: scale(0.1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Countdown */
        #countdown-display {
            position: absolute;
            font-size: 30vh;
            font-weight: bold;
            color: #fff;
            display: none;
            animation: countdownPulse 1s infinite;
        }

        @keyframes countdownPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        /* Dice 3D */
        #dice-container {
            position: absolute;
            width: 200px;
            height: 200px;
            perspective: 800px;
            display: none;
        }

        #dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: diceRoll 2s ease-out forwards;
        }

        .dice-face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #000;
            border: 3px solid #333;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
        }

        .dice-face:nth-child(1) {
            transform: rotateY(0deg) translateZ(100px);
        }

        .dice-face:nth-child(2) {
            transform: rotateY(180deg) translateZ(100px);
        }

        .dice-face:nth-child(3) {
            transform: rotateY(90deg) translateZ(100px);
        }

        .dice-face:nth-child(4) {
            transform: rotateY(-90deg) translateZ(100px);
        }

        .dice-face:nth-child(5) {
            transform: rotateX(90deg) translateZ(100px);
        }

        .dice-face:nth-child(6) {
            transform: rotateX(-90deg) translateZ(100px);
        }

        @keyframes diceRoll {
            0% {
                transform: rotate3d(1, 1, 1, 0deg);
            }

            100% {
                transform: rotate3d(1, 1, 1, 720deg);
            }
        }

        /* Ripple from logo */
        #ripple-overlay {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            display: none;
            pointer-events: none;
        }

        #ripple-overlay.active {
            animation: rippleExpand 2s ease-out forwards;
        }

        @keyframes rippleExpand {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(30);
                opacity: 0;
            }
        }

        /* Audio (hidden) */
        #audio-player {
            display: none;
        }

        /* Phase 2 Steps */
        /* Text */
        #text-display {
            position: absolute;
            font-size: 12vh;
            font-weight: bold;
            color: #fff;
            text-align: center;
            max-width: 90%;
            display: none;
        }

        /* Pulse */
        body.pulse-bg {
            animation: pulseEffect 1.5s ease-in-out infinite !important;
        }

        @keyframes pulseEffect {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Spiral */
        #spiral-overlay {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 5px solid #fff;
            border-radius: 50%;
            display: none;
        }

        #spiral-overlay.active {
            animation: spiralSpin 3s linear infinite;
        }

        @keyframes spiralSpin {
            0% {
                transform: rotate(0deg) scale(0.5);
            }

            50% {
                transform: rotate(180deg) scale(1.5);
            }

            100% {
                transform: rotate(360deg) scale(0.5);
            }
        }

        /* Color overlay */
        #color-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            transition: background-color 0.5s;
        }

        /* Number */
        #number-display {
            position: absolute;
            font-size: 25vh;
            font-weight: bold;
            color: #fff;
            display: none;
        }

        /* Breathing */
        body.breathing-bg {
            animation: breatheEffect 4s ease-in-out infinite;
            /* Default, overridden by JS */
        }

        @keyframes breatheEffect {

            0%,
            100% {
                background-color: #000;
                transform: scale(1);
            }

            50% {
                background-color: var(--breathing-color, #333);
                transform: scale(1.02);
            }
        }

        /* Glitch */
        #glitch-text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vh;
            font-weight: bold;
            color: #fff;
            display: none;
            text-shadow: 2px 2px #f00, -2px -2px #00f;
            z-index: 1000;
        }

        /* Glitch */
        body.glitch-bg {
            animation: glitchEffect 0.3s infinite !important;
        }

        @keyframes glitchEffect {
            0% {
                transform: translate(0);
                filter: hue-rotate(0deg);
            }

            20% {
                transform: translate(-2px, 2px);
                filter: hue-rotate(90deg);
            }

            40% {
                transform: translate(2px, -2px);
                filter: hue-rotate(180deg);
            }

            60% {
                transform: translate(-2px, -2px);
                filter: hue-rotate(270deg);
            }

            80% {
                transform: translate(2px, 2px);
                filter: hue-rotate(360deg);
            }

            100% {
                transform: translate(0);
                filter: hue-rotate(0deg);
            }
        }

        /* Ripple center */
        #ripple-center {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 50px;
            height: 50px;
            margin-left: -25px;
            margin-top: -25px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            display: none;
        }

        #ripple-center.active {
            animation: rippleCenterExpand 2s ease-out forwards;
        }

        @keyframes rippleCenterExpand {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(30);
                opacity: 0;
            }
        }

        /* Zoom */
        body.zoom-bg {
            animation: zoomEffect 3s ease-in-out forwards !important;
        }

        @keyframes zoomEffect {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(3);
            }
        }

        /* Shake */
        body.shake-bg {
            animation: shakeEffect 0.5s infinite !important;
        }

        @keyframes shakeEffect {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px);
            }
        }

        /* Fade */
        #fade-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            transition: opacity 2s;
        }

        #fade-overlay.active {
            opacity: 1;
        }

        /* Phase 3 Advanced Steps */
        /* CardFlip */
        #card-flip-container {
            position: absolute;
            width: 300px;
            height: 450px;
            perspective: 1000px;
            display: none;
        }

        #card-flip {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: cardFlipAnim 2s ease-in-out forwards;
        }

        @keyframes cardFlipAnim {
            0% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(180deg);
            }
        }

        /* Slot */
        #slot-container {
            position: absolute;
            display: none;
            font-size: 15vh;
        }

        /* Pinpoint */
        #pinpoint-target {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 5px solid #f00;
            border-radius: 50%;
            display: none;
            animation: pinpointShrink 3s ease-in forwards;
        }

        @keyframes pinpointShrink {
            0% {
                transform: scale(5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Unlock */
        #unlock-icon {
            position: absolute;
            font-size: 20vh;
            display: none;
            animation: unlockAnim 2s ease-out forwards;
        }

        @keyframes unlockAnim {
            0% {
                content: '🔒';
            }

            50% {
                content: '🔓';
                transform: rotate(0deg);
            }

            100% {
                content: '🔓';
                transform: rotate(20deg);
            }
        }

        /* Mirror */
        body.mirror-h {
            transform: scaleX(-1);
        }

        body.mirror-v {
            transform: scaleY(-1);
        }

        /* Wave */
        #wave-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(0, 150, 255, 0.5));
            display: none;
            animation: waveMove 3s ease-in-out infinite;
        }

        @keyframes waveMove {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-30px);
            }
        }

        /* Sparkle */
        .sparkle-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            animation: sparklefall 2s linear forwards;
        }

        @keyframes sparklefall {
            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(100vh);
            }
        }

        /* Fire */
        #fire-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            display: none;
            background: linear-gradient(to top, #ff4500, #ff8c00, transparent);
            animation: fireFlicker 0.3s infinite alternate;
        }

        @keyframes fireFlicker {
            0% {
                opacity: 0.8;
                transform: scaleY(1);
            }

            100% {
                opacity: 1;
                transform: scaleY(1.1);
            }
        }

        /* Beat */
        body.beat-flash {
            animation: beatFlash 0.3s ease-in-out !important;
        }

        @keyframes beatFlash {

            0%,
            100% {
                background-color: inherit;
            }

            50% {
                background-color: #fff;
            }
        }

        /* StaticNoise */
        #static-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, #000 0px, #fff 2px, #000 4px);
            display: none;
            animation: staticFlicker 0.1s infinite;
        }

        @keyframes staticFlicker {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        /* Eye */
        #eye-container {
            position: absolute;
            font-size: 20vh;
            display: none;
            animation: eyeBlink 3s ease-in-out infinite;
        }

        @keyframes eyeBlink {

            0%,
            90%,
            100% {
                content: '👁️';
            }

            93%,
            97% {
                content: '😑';
            }
        }

        /* Puzzle */
        #puzzle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        .puzzle-piece {
            position: absolute;
            width: 50%;
            height: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
        }

        /* Mask */
        #mask-overlay {
            position: absolute;
            font-size: 30vh;
            display: none;
            animation: maskAppear 2s ease-out forwards;
        }

        @keyframes maskAppear {
            0% {
                opacity: 0;
                transform: scale(0);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Crystal */
        #crystal-ball {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8), rgba(100, 100, 255, 0.4));
            display: none;
            animation: crystalGlow 2s ease-in-out infinite;
        }

        @keyframes crystalGlow {

            0%,
            100% {
                box-shadow: 0 0 20px #fff, 0 0 40px #88f;
            }

            50% {
                box-shadow: 0 0 40px #fff, 0 0 80px #88f;
            }
        }

        /* Snapshot */
        #snapshot-flash {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            display: none;
        }

        #snapshot-flash.active {
            animation: cameraFlash 0.5s ease-out forwards;
        }

        @keyframes cameraFlash {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* Starfield */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: starMove 3s linear infinite;
        }

        @keyframes starMove {
            0% {
                transform: translateZ(0) scale(1);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateZ(100px) scale(3);
                opacity: 0;
            }
        }

        #arrow {
            animation: arrowBounce 2s infinite;
        }

        @keyframes arrowBounce {

            0%,
            20%,
            50%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            40% {
                transform: translateX(-50%) translateY(-20px);
            }

            60% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        @keyframes logoPulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        /* Background Animations Logo */
        .bg-anim-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            /* Behind screens */
            pointer-events: none;
        }

        .anim-respiration {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, rgba(0, 0, 0, 0) 80%);
            animation: bgBreathe 4s ease-in-out infinite alternate;
        }

        @keyframes bgBreathe {
            0% {
                transform: scale(0.8);
                opacity: 0.2;
            }

            100% {
                transform: scale(1.5);
                opacity: 0.8;
            }
        }

        .anim-vague {
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.05) 75%, transparent 75%, transparent);
            background-size: 100px 100px;
            animation: bgWave 4s linear infinite;
        }

        @keyframes bgWave {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 100px 100px;
            }
        }

        /* 10 Nouvelles Animations */
        .anim-hyperspace {
            background: url('images/hyperspace.gif') no-repeat center center;
            background-size: cover;
            opacity: 0.6;
        }

        .anim-pluie-matrix {
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0.1), rgba(0, 255, 0, 0.05));
            animation: matrixRain 2s linear infinite;
        }

        @keyframes matrixRain {
            0% {
                background-position: 0 -100vh;
            }

            100% {
                background-position: 0 100vh;
            }
        }

        .anim-battement-coeur {
            background: radial-gradient(circle, rgba(255, 0, 0, 0.1) 0%, transparent 60%);
            animation: bgHeartbeat 1.5s infinite;
        }

        @keyframes bgHeartbeat {
            0% {
                transform: scale(1);
                opacity: 0.3;
            }

            20% {
                transform: scale(1.1);
                opacity: 0.6;
            }

            40% {
                transform: scale(1);
                opacity: 0.3;
            }

            60% {
                transform: scale(1.15);
                opacity: 0.8;
            }

            80% {
                transform: scale(1);
                opacity: 0.3;
            }

            100% {
                transform: scale(1);
                opacity: 0.3;
            }
        }

        .anim-etoiles-filantes {
            background: radial-gradient(circle, #fff 10%, transparent 10%), radial-gradient(circle, #fff 10%, transparent 10%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            animation: shootingStars 5s linear infinite;
            opacity: 0.1;
        }

        @keyframes shootingStars {
            100% {
                background-position: 500px 500px, 525px 525px;
            }
        }

        .anim-mystique {
            background: conic-gradient(from 0deg, rgba(255, 0, 255, 0.1), rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.1));
            animation: mysticSpin 10s linear infinite;
        }

        @keyframes mysticSpin {
            100% {
                transform: rotate(360deg) scale(2);
            }
        }

        .anim-feu {
            background: linear-gradient(to top, rgba(255, 100, 0, 0.3) 0%, transparent 60%);
            animation: fireFlicker 0.1s infinite alternate;
        }

        @keyframes fireFlicker {
            0% {
                opacity: 0.8;
                transform: translateY(0);
            }

            100% {
                opacity: 1;
                transform: translateY(-5px);
            }
        }

        .anim-glitch-bg {
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.05) 0px, transparent 1px, transparent 4px, rgba(255, 255, 255, 0.05) 5px);
            animation: glitchLines 0.2s infinite;
        }

        @keyframes glitchLines {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(5px);
            }
        }

        .anim-zoom-dezoom {
            /* Pulsation faible du logo : applied via JS */
            display: none;
        }

        .anim-laser {
            background: linear-gradient(90deg, transparent 40%, rgba(255, 0, 0, 0.2) 50%, transparent 60%);
            background-size: 200% 100%;
            animation: laserSweep 2s ease-in-out infinite alternate;
        }

        @keyframes laserSweep {
            0% {
                background-position: -100% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .anim-boussole {
            background: repeating-radial-gradient(circle, transparent, transparent 20px, rgba(255, 255, 255, 0.05) 20px, rgba(255, 255, 255, 0.05) 21px);
            animation: compassRotate 20s linear infinite;
        }

        @keyframes compassRotate {
            100% {
                transform: rotate(360deg);
            }
        }

        .anim-hypnose {
            background: repeating-radial-gradient(circle,
                    #000000 0,
                    #000000 20px,
                    #ffffff 20px,
                    #ffffff 40px);
            animation: hypnoticSpin 10s linear infinite;
            /* Make it large enough to cover the screen while spinning */
            width: 200vw;
            height: 200vh;
            left: -50vw;
            top: -50vh;
            position: absolute;
        }

        @keyframes hypnoticSpin {
            100% {
                transform: rotate(360deg);
            }
        }

        .pulse-bg {
            animation: pulseBg 1s infinite alternate;
        }

        @keyframes pulseBg {
            0% {
                background-color: transparent;
            }

            100% {
                background-color: var(--pulse-color, #ff0000);
            }
        }

        .breathing-bg {
            animation: breathingBg 4s ease-in-out infinite alternate;
        }

        @keyframes breathingBg {
            0% {
                box-shadow: inset 0 0 50px var(--breathing-color, #333);
            }

            100% {
                box-shadow: inset 0 0 200px var(--breathing-color, #333);
            }
        }

        .glitch-bg {
            animation: glitchBg 0.2s infinite;
        }

        @keyframes glitchBg {
            0% {
                transform: translate(0)
            }

            25% {
                transform: translate(-2px, 2px)
            }

            50% {
                transform: translate(-2px, -2px)
            }

            75% {
                transform: translate(2px, 2px)
            }

            100% {
                transform: translate(2px, -2px)
            }
        }

        .zoom-bg {
            animation: zoomBg 2s infinite alternate ease-in-out;
        }

        @keyframes zoomBg {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(var(--zoom-intensity, 1.1));
            }
        }

        .shake-bg {
            animation: shakeBg 0.5s infinite;
        }

        @keyframes shakeBg {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(calc(var(--shake-intensity, 5px) * -1));
            }

            75% {
                transform: translateX(var(--shake-intensity, 5px));
            }
        }

        /* --- Global Touch Trails --- */
        .touch-trail {
            position: absolute;
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: trailFade 1s linear forwards;
        }

        @keyframes trailFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
            }
        }
    </style>
</head>
